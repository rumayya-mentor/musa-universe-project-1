<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Musa's 7 Habits Journey 🌳</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a1628;--bg2:#0f2040;--card:rgba(255,255,255,0.055);--border:rgba(255,255,255,0.09);--text:#e8f0ff;--muted:rgba(255,255,255,0.45);}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:linear-gradient(160deg,#0a1628 0%,#0f2040 50%,#0a1a35 100%);font-family:'Nunito',sans-serif;color:#e8f0ff;padding-bottom:80px;overflow-x:hidden;}
body::before{content:'';position:fixed;width:600px;height:600px;top:-200px;right:-200px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.08),transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;width:500px;height:500px;bottom:-150px;left:-150px;border-radius:50%;background:radial-gradient(circle,rgba(239,68,68,0.07),transparent 70%);pointer-events:none;z-index:0;}
.header{background:linear-gradient(135deg,#081426,#0f2a50,#081426);padding:22px 20px 0;text-align:center;border-bottom:2px solid rgba(255,255,255,0.07);position:relative;z-index:10;overflow:hidden;}
.header::after{content:'🌊🔥🌪️🪨';position:absolute;top:10px;right:14px;font-size:16px;opacity:0.18;letter-spacing:3px;}
.header-band{display:inline-block;height:3px;width:70px;border-radius:99px;background:linear-gradient(90deg,#3b82f6,#ef4444,#6366f1,#84cc16);margin-bottom:10px;}
.header h1{font-family:'Fredoka One',cursive;font-size:28px;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,0.5);line-height:1.2;cursor:pointer;user-select:none;}
.header-sub{font-size:12px;color:rgba(255,255,255,0.45);margin:4px 0 16px;font-weight:700;}
.nav{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;}
.nav-btn{padding:8px 13px;border-radius:10px 10px 0 0;border:2px solid rgba(255,255,255,0.1);border-bottom:none;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;cursor:pointer;transition:all 0.2s;}
.nav-btn.active{background:#fff;color:#081426;border-color:#fff;}
.nav-btn.ptab{border-color:rgba(251,191,36,0.3);color:rgba(251,191,36,0.6);}
.nav-btn.ptab.active{background:#fbbf24;color:#081426;}
.view{display:none;max-width:620px;margin:0 auto;padding:22px 15px;position:relative;z-index:1;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
/* HOME */
.intro-hero{background:linear-gradient(135deg,rgba(59,130,246,0.14),rgba(99,102,241,0.07));border-radius:20px;border:2px solid rgba(59,130,246,0.28);padding:24px 20px;margin-bottom:18px;}
.intro-hero .aq{font-style:italic;font-size:13px;color:rgba(255,255,255,0.55);border-left:3px solid #3b82f6;padding-left:11px;margin-bottom:14px;}
.intro-hero h2{font-family:'Fredoka One',cursive;font-size:22px;margin-bottom:10px;}
.intro-hero p{font-size:13px;line-height:1.75;color:rgba(255,255,255,0.78);}
.goal-card{background:linear-gradient(135deg,rgba(239,68,68,0.12),rgba(239,68,68,0.04));border-radius:16px;border:2px solid rgba(239,68,68,0.28);padding:15px 17px;margin-bottom:18px;display:flex;align-items:center;gap:13px;}
.goal-card .gi{font-size:34px;flex-shrink:0;}
.goal-card h3{font-family:'Fredoka One',cursive;font-size:16px;margin-bottom:4px;color:#fca5a5;}
.goal-card p{font-size:12px;color:rgba(255,255,255,0.7);line-height:1.6;}
.chip{display:inline-block;padding:3px 12px;border-radius:99px;font-size:11px;font-weight:800;background:rgba(255,255,255,0.1);margin-bottom:10px;}
.thpill{display:flex;align-items:center;gap:11px;padding:10px 15px;border-radius:13px;border:2px solid transparent;cursor:pointer;transition:transform 0.15s;margin-bottom:7px;}
.thpill:hover{transform:translateX(5px);}
.btn-primary{display:inline-block;background:linear-gradient(135deg,#f59e0b,#ea580c);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;padding:13px 30px;border-radius:99px;border:none;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 18px rgba(245,158,11,0.35);}
.btn-primary:hover{transform:translateY(-2px);}
/* LEARN */
.learn-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.btn-icon{background:rgba(255,255,255,0.1);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.btn-icon:hover{background:rgba(255,255,255,0.2);}
.btn-icon:disabled{opacity:0.22;cursor:default;}
.hdots{display:flex;justify-content:center;gap:7px;margin-bottom:16px;}
.hlcard{border-radius:20px;overflow:hidden;border:2px solid rgba(255,255,255,0.09);animation:fadeUp 0.32s ease both;}
.lch{padding:24px 20px 16px;text-align:center;position:relative;overflow:hidden;}
.lch .ebg{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0.07;font-size:110px;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.lch .hemoji{font-size:48px;display:block;margin-bottom:8px;position:relative;}
.lch .hnum{font-size:11px;font-weight:800;letter-spacing:2px;opacity:0.6;text-transform:uppercase;margin-bottom:3px;position:relative;}
.lch h2{font-family:'Fredoka One',cursive;font-size:25px;line-height:1.2;position:relative;}
.lch .badge{display:inline-block;margin-top:7px;padding:4px 14px;border-radius:99px;font-size:12px;font-weight:800;background:rgba(255,255,255,0.13);position:relative;}
.lcb{padding:0 19px 24px;}
.sblk{background:rgba(255,255,255,0.05);border-radius:14px;padding:14px 16px;margin-bottom:12px;border-left:4px solid;}
.sblk .si{font-size:18px;margin-bottom:5px;display:block;}
.sblk h3{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:0.58;margin-bottom:6px;}
.sblk p{font-size:13px;line-height:1.72;color:rgba(255,255,255,0.82);}
.exgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.exc{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,0.09);}
.exc .ei{font-size:20px;margin-bottom:5px;display:block;}
.exc h4{font-size:10px;font-weight:800;letter-spacing:0.5px;opacity:0.58;margin-bottom:3px;text-transform:uppercase;}
.exc p{font-size:12px;line-height:1.58;color:rgba(255,255,255,0.75);}
.qblk{background:rgba(255,255,255,0.04);border-radius:13px;padding:13px 17px;border:1px dashed rgba(255,255,255,0.14);text-align:center;margin-bottom:12px;font-size:14px;font-style:italic;color:rgba(255,255,255,0.68);line-height:1.6;}
.avcon{border-radius:13px;padding:13px 15px;margin-bottom:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);}
.avcon h3{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:0.58;margin-bottom:6px;}
.avcon p{font-size:12px;line-height:1.65;color:rgba(255,255,255,0.8);}
.chalbox{border-radius:14px;padding:14px 16px;}
.chalbox h3{font-size:13px;font-weight:900;margin-bottom:5px;}
.chalbox p{font-size:13px;line-height:1.65;color:rgba(255,255,255,0.82);}
.lbnav{display:flex;gap:9px;margin-top:16px;}
.btn-ol{padding:11px 20px;border-radius:12px;border:2px solid rgba(255,255,255,0.2);background:transparent;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all 0.2s;}
.btn-ol:hover{background:rgba(255,255,255,0.08);}
.btn-ol:disabled{opacity:0.25;cursor:default;}
.btn-fl{padding:11px 20px;border-radius:12px;border:none;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(0,0,0,0.3);}
.btn-fl:hover{transform:translateY(-1px);}
/* ASSESSMENT */
.ass-intro{text-align:center;padding:24px 20px;background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(59,130,246,0.07));border-radius:20px;border:2px solid rgba(99,102,241,0.3);margin-bottom:20px;animation:fadeUp 0.4s ease;}
.ass-intro .ai{font-size:48px;margin-bottom:10px;display:block;}
.ass-intro h2{font-family:'Fredoka One',cursive;font-size:24px;margin-bottom:10px;}
.ass-intro p{font-size:13px;line-height:1.72;color:rgba(255,255,255,0.78);}
.aprg{background:rgba(255,255,255,0.08);border-radius:99px;height:8px;margin:16px 0 6px;overflow:hidden;}
.aprgb{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366f1,#3b82f6);transition:width 0.5s ease;}
.aprgL{font-size:11px;color:rgba(255,255,255,0.45);text-align:center;font-weight:700;margin-bottom:16px;}
.qcard{background:rgba(255,255,255,0.055);border:2px solid rgba(255,255,255,0.09);border-radius:18px;padding:20px;animation:fadeUp 0.35s ease both;}
.qhtag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:800;margin-bottom:12px;}
.qtxt{font-size:15px;font-weight:800;line-height:1.5;margin-bottom:16px;color:#fff;}
.qopts{display:flex;flex-direction:column;gap:8px;}
.qopt{padding:12px 15px;border-radius:12px;border:2px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);cursor:pointer;font-size:13px;font-weight:700;color:rgba(255,255,255,0.82);transition:all 0.2s;text-align:left;font-family:'Nunito',sans-serif;}
.qopt:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.2);}
.qopt.sel{border-color:var(--sc);background:color-mix(in srgb,var(--sc) 18%,transparent);color:#fff;}
.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.qctr{font-size:12px;color:rgba(255,255,255,0.45);font-weight:700;}
/* RADAR */
.radwrap{display:flex;flex-direction:column;align-items:center;padding:20px;background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.09);border-radius:20px;margin-bottom:16px;}
.radwrap h3{font-family:'Fredoka One',cursive;font-size:20px;margin-bottom:4px;}
.radwrap p{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:16px;text-align:center;}
.radscores{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-top:16px;}
.rsi{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.05);}
.rsibw{background:rgba(255,255,255,0.1);border-radius:99px;height:5px;margin-top:4px;}
.rsib{height:100%;border-radius:99px;transition:width 0.8s ease;}
.tleg{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.tld{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);}
.tld span{width:10px;height:10px;border-radius:50%;display:inline-block;}
.rhc{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:13px;border:2px solid;margin-bottom:7px;}
.tbdg{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800;}
/* DAILY */
.trial-hdr{text-align:center;margin-bottom:18px;}
.trial-hdr h2{font-family:'Fredoka One',cursive;font-size:22px;}
.tdi{display:flex;justify-content:center;gap:8px;margin:10px 0;}
.tdidot{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:rgba(255,255,255,0.45);transition:all 0.3s;}
.tdidot.done{background:linear-gradient(135deg,#10b981,#059669);border-color:#10b981;color:#fff;}
.tdidot.active{border-color:#fbbf24;color:#fbbf24;animation:pulse 2s infinite;}
.beltrow{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.45);}
.beltstrip{height:7px;width:55px;border-radius:99px;}
.pwrap{max-width:320px;margin:0 auto 5px;background:rgba(255,255,255,0.1);border-radius:99px;height:11px;overflow:hidden;}
.pbar{height:100%;border-radius:99px;background:linear-gradient(90deg,#f59e0b,#10b981);transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);}
.plbl{color:#fbbf24;font-weight:800;font-size:13px;text-align:center;margin-bottom:3px;}
.miscard{background:linear-gradient(135deg,rgba(59,130,246,0.12),rgba(99,102,241,0.06));border-radius:18px;border:2px solid rgba(59,130,246,0.3);padding:18px;margin-bottom:14px;}
.miscard h3{font-family:'Fredoka One',cursive;font-size:17px;color:#93c5fd;margin-bottom:8px;}
.miscard p{font-size:13px;line-height:1.68;color:rgba(255,255,255,0.82);}
.misinp{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(59,130,246,0.4);border-radius:10px;padding:10px 13px;color:#fff;font-size:13px;font-family:'Nunito',sans-serif;outline:none;margin-top:10px;resize:vertical;min-height:70px;}
.misinp::placeholder{color:rgba(255,255,255,0.28);}
.hcc{border-radius:16px;margin-bottom:9px;border:2px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.055);overflow:hidden;transition:border-color 0.3s,background 0.3s;animation:fadeUp 0.4s ease both;}
.hcc.done{border-color:var(--hc);background:color-mix(in srgb,var(--hc) 14%,transparent);}
.hccm{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;}
.hccbox{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.09);border:2px solid rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:transparent;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.hcc.done .hccbox{background:var(--hc);border-color:var(--hc);color:#fff;transform:scale(1.1);}
.hcct{flex:1;min-width:0;}
.hccn{font-size:13px;font-weight:800;color:rgba(255,255,255,0.85);line-height:1.2;}
.hcc.done .hccn{color:#fff;}
.hccs{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;font-weight:600;}
.hccp{padding:7px 14px;border-top:1px solid rgba(255,255,255,0.06);font-size:12px;color:rgba(255,255,255,0.45);cursor:pointer;font-style:italic;transition:color 0.2s;}
.hccp:hover{color:rgba(255,255,255,0.75);}
.hccnr{display:none;padding:0 14px 12px;gap:7px;}
.hccnr.open{display:flex;}
.hccni{flex:1;background:rgba(255,255,255,0.09);border:1.5px solid var(--hc);border-radius:9px;padding:7px 11px;color:#fff;font-size:12px;font-family:'Nunito',sans-serif;outline:none;resize:vertical;min-height:55px;}
.hccni::placeholder{color:rgba(255,255,255,0.28);}
.hccnsv{background:var(--hc);border:none;border-radius:9px;padding:7px 13px;color:#fff;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;align-self:flex-start;}
.winban{display:none;text-align:center;padding:20px;background:rgba(251,191,36,0.11);border-radius:17px;border:2px solid #fbbf24;margin-top:8px;}
.winban.show{display:block;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.winban .tr{font-size:40px;}
.winban h2{color:#fbbf24;font-family:'Fredoka One',cursive;font-size:20px;margin:7px 0 3px;}
.daycbtn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;cursor:pointer;margin-top:14px;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 18px rgba(16,185,129,0.3);}
.daycbtn:hover{transform:translateY(-2px);}
.handoff{text-align:center;padding:30px 20px;background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(251,191,36,0.04));border-radius:20px;border:2px solid rgba(251,191,36,0.3);animation:popIn 0.4s ease;}
.handoff .hi{font-size:52px;margin-bottom:12px;display:block;}
.handoff h2{font-family:'Fredoka One',cursive;font-size:24px;color:#fbbf24;margin-bottom:10px;}
.handoff p{font-size:13px;line-height:1.72;color:rgba(255,255,255,0.78);margin-bottom:16px;}
.wkprog{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(59,130,246,0.06));border-radius:18px;border:2px solid rgba(99,102,241,0.3);padding:18px;margin-bottom:14px;}
.wkprog h3{font-family:'Fredoka One',cursive;font-size:17px;color:#a5b4fc;margin-bottom:6px;}
.wkprog .wkm{font-size:11px;color:rgba(255,255,255,0.45);font-weight:700;margin-bottom:10px;}
.wkprog p{font-size:13px;line-height:1.7;color:rgba(255,255,255,0.82);white-space:pre-wrap;}
.lockprog{text-align:center;padding:24px;background:rgba(255,255,255,0.04);border-radius:18px;border:2px dashed rgba(255,255,255,0.15);}
.lockprog .li{font-size:42px;margin-bottom:10px;display:block;}
.lockprog p{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.65;}
/* PROGRESS */
.prog-hdr{text-align:center;margin-bottom:18px;}
.prog-hdr h2{font-family:'Fredoka One',cursive;font-size:22px;}
.prog-hdr p{font-size:12px;color:rgba(255,255,255,0.45);margin-top:4px;}
.bchwrap{background:rgba(255,255,255,0.05);border-radius:17px;padding:18px 14px 12px;border:1px solid rgba(255,255,255,0.09);margin-bottom:16px;}
.bars{display:flex;align-items:flex-end;justify-content:space-around;height:95px;gap:5px;margin-bottom:8px;}
.bc{display:flex;flex-direction:column;align-items:center;flex:1;}
.bcc{font-size:10px;font-weight:800;color:#fbbf24;margin-bottom:3px;min-height:14px;}
.b{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:height 0.6s cubic-bezier(0.34,1.56,0.64,1);}
.bl{font-size:10px;font-weight:700;margin-top:5px;color:rgba(255,255,255,0.45);}
.bl.today{color:#fbbf24;}
.strow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 12px;margin-bottom:7px;border:1px solid rgba(255,255,255,0.09);}
.sdots{display:flex;gap:3px;margin-top:5px;}
.sdot{width:19px;height:19px;border-radius:5px;background:rgba(255,255,255,0.1);}
.str{text-align:right;flex-shrink:0;}
.sfire{color:#fbbf24;font-weight:800;font-size:12px;}
.sdlbl{color:rgba(255,255,255,0.45);font-size:10px;margin-top:2px;}
/* PARENT */
.pinsc{text-align:center;padding:40px 20px;animation:fadeUp 0.4s ease;}
.pinsc .pi{font-size:52px;margin-bottom:14px;display:block;}
.pinsc h2{font-family:'Fredoka One',cursive;font-size:24px;margin-bottom:8px;}
.pinsc p{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:20px;}
.pininp{width:100%;max-width:320px;background:rgba(255,255,255,0.08);border:2px solid rgba(251,191,36,0.4);border-radius:13px;padding:13px 16px;color:#fff;font-size:15px;font-family:'Nunito',sans-serif;outline:none;text-align:center;letter-spacing:2px;margin-bottom:12px;}
.pininp::placeholder{letter-spacing:0;color:rgba(255,255,255,0.28);}
.pinerr{color:#f87171;font-size:12px;font-weight:700;margin-bottom:10px;display:none;}
.pdbody{animation:fadeUp 0.4s ease;}
.pdhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.pdhdr h2{font-family:'Fredoka One',cursive;font-size:22px;color:#fbbf24;}
.pdlkbtn{background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.3);border-radius:99px;padding:6px 14px;color:#fbbf24;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.pdsec{margin-bottom:18px;}
.pdst{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(251,191,36,0.8);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(251,191,36,0.15);}
.pdsg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}

/* ASSESSMENT */
function rasc(){
  const el=document.getElementById("assessContent");
  if(ST.ad){rar(el);return;}
  if(aIdx===0&&Object.keys(aAns).length===0){
    el.innerHTML=`<div class="ass-intro"><span class="ai">🥋</span><h2>Habit Assessment</h2>

    <button class="btn-primary" style="margin-top:16px" onclick="aIdx=0;raq(document.getElementById('assessContent'))">Start Assessment →</button></div>`;
    return;

}

function raq(el){
  const q=QS[aIdx];const h=HABITS.find(x=>x.id===q.hid);

  el.innerHTML=`

    <p class="qtxt">${q.q}</p>
    <div class="qopts">${q.opts.map((o,i)=>`<button class="qopt ${sel===q.sc[i]?"sel":""}" style="--sc:${h.color}" onclick="selA(${q.sc[i]},${aIdx})">${o}</button>`).join("")}</div>
    <div class="qnav">
      <button class="btn-ol" style="padding:8px 16px;font-size:12px" onclick="aBack()" ${aIdx===0?"disabled":""}>← Back</button>
      <span class="qctr">${aIdx+1}/${QS.length}</span>
      <button class="btn-fl" style="background:${h.color};padding:8px 16px;font-size:12px;opacity:${sel?1:0.4}" onclick="aNext()" ${!sel?"disabled":""}>
        ${aIdx===QS.length-1?"See Results →":"Next →"}
      </button>
    </div>
  </div>`;
}

function selA(sc,idx){aAns[idx]=sc;raq(document.getElementById("assessContent"));}
function aBack(){if(aIdx>0){aIdx--;raq(document.getElementById("assessContent"));}}
function aNext(){
  if(!aAns[aIdx])return;
  aIdx++;
  if(aIdx>=QS.length){finA();}
  else{raq(document.getElementById("assessContent"));}
}

function finA(){
  const hs={};HABITS.forEach(h=>{hs[h.id]=0;});
  QS.forEach((q,i)=>{if(aAns[i])hs[q.hid]+=aAns[i];});
  ST.aa=aAns;ST.as=hs;ST.ad=true;ST.adate=tdk();sv();
  rar(document.getElementById("assessContent"));
}

function gTier(s){
  if(s>=7)return{lbl:"Strong 💪",color:"#10b981",bg:"rgba(16,185,129,0.15)",brd:"rgba(16,185,129,0.3)"};
  if(s>=4)return{lbl:"Growing 📈",color:"#f59e0b",bg:"rgba(245,158,11,0.15)",brd:"rgba(245,158,11,0.3)"};
  return{lbl:"Needs Work 🎯",color:"#ef4444",bg:"rgba(239,68,68,0.15)",brd:"rgba(239,68,68,0.3)"};
}

function bRad(sc){
  const cx=140,cy=140,r=100;const n=HABITS.length;
  const pts=HABITS.map((h,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;const v=((sc[h.id]||0)/9)*r;return{x:cx+v*Math.cos(a),y:cy+v*Math.sin(a),lx:cx+(r+22)*Math.cos(a),ly:cy+(r+22)*Math.sin(a),e:h.emoji};});
  const grids=[0.33,0.67,1].map(l=>{const gp=HABITS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`${cx+r*l*Math.cos(a)},${cy+r*l*Math.sin(a)}`;});return`<polygon points="${gp.join(" ")}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;});
  const axes=HABITS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;});
  const pp=pts.map(p=>`${p.x},${p.y}`).join(" ");
  return`<svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
    ${grids.join("")}${axes.join("")}
    <polygon points="${pp}" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="2"/>
    ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${HABITS[i].color}"/>`).join("")}
    ${pts.map(p=>`<text x="${p.lx}" y="${p.ly}" text-anchor="middle" dominant-baseline="middle" font-size="16">${p.e}</text>`).join("")}
  </svg>`;
}

  <div class="tleg"><div class="tld"><span style="background:#10b981"></span>Strong (7-9)</div><div class="tld"><span style="background:#f59e0b"></span>Growing (4-6)</div><div class="tld"><span style="background:#ef4444"></span>Needs Work (1-3)</div></div></div>
  ${strong.length?`<div style="margin-bottom:14px"><p class="chip" style="background:rgba(16,185,129,0.15);color:#10b981">💪 Your Natural Element</p>${strong.map(({h,s,t})=>`<div class="rhc" style="background:${t.bg};border-color:${t.brd}"><span style="font-size:22px">${h.emoji}</span><div style="flex:1"><div style="font-size:13px;font-weight:800">${h.name}</div><div style="font-size:11px;opacity:0.6;margin-top:1px">${h.subtitle}</div></div><span style="font-size:18px;font-weight:900;color:${t.color}">${s}/9</span><span class="tbdg" style="background:${t.bg};color:${t.color};border:1px solid ${t.brd}">${t.lbl}</span></div>`).join("")}</div>`:""}
  ${growing.length?`<div style="margin-bottom:14px"><p class="chip" style="background:rgba(245,158,11,0.15);color:#f59e0b">📈 In Training</p>${growing.map(({h,s,t})=>`<div class="rhc" style="background:${t.bg};border-color:${t.brd}"><span style="font-size:22px">${h.emoji}</span><div style="flex:1"><div style="font-size:13px;font-weight:800">${h.name}</div><div style="font-size:11px;opacity:0.6;margin-top:1px">${h.subtitle}</div></div><span style="font-size:18px;font-weight:900;color:${t.color}">${s}/9</span><span class="tbdg" style="background:${t.bg};color:${t.color};border:1px solid ${t.brd}">${t.lbl}</span></div>`).join("")}</div>`:""}
  ${needs.length?`<div style="margin-bottom:14px"><p class="chip" style="background:rgba(239,68,68,0.15);color:#ef4444">🎯 Priority Focus</p>${needs.map(({h,s,t})=>`<div class="rhc" style="background:${t.bg};border-color:${t.brd}"><span style="font-size:22px">${h.emoji}</span><div style="flex:1"><div style="font-size:13px;font-weight:800">${h.name}</div><div style="font-size:11px;opacity:0.6;margin-top:1px">${h.subtitle}</div></div><span style="font-size:18px;font-weight:900;color:${t.color}">${s}/9</span><span class="tbdg" style="background:${t.bg};color:${t.color};border:1px solid ${t.brd}">${t.lbl}</span></div>`).join("")}</div>`:""}
  <div style="background:rgba(59,130,246,0.1);border:2px solid rgba(59,130,246,0.3);border-radius:16px;padding:16px 18px;margin-bottom:14px">
  <h3 style="font-family:'Fredoka One',cursive;font-size:17px;color:#93c5fd;margin-bottom:8px">🥋 What happens next?</h3>

  <div style="text-align:center"><button class="btn-primary" onclick="showView('daily')">Start Day 1 of 3 Trial →</button></div>
  </div>`;
}

function rthc(th,tn,pr){
  const c=document.getElementById("thcards");if(!c)return;

    return`<div class="hcc ${id?"done":""}" style="--hc:${h.color};animation-delay:${i*0.04}s">

        <button class="hccnsv" style="background:${h.color}" onclick="svTN(${h.id})">Save</button>

}

  <div id="whcards"></div>
  <div class="winban ${done===7?"show":""}"><div class="tr">🏆</div><h2>Black Belt Day!</h2><p>All 7 mastered. 🌊🔥🌪️🪨</p></div>`;
  const wp2=["🌊 What can you control today?","🎯 Is today building toward Shenton?","📋 First things first?","🤝 Win-win opportunity today?","👂 Who needs to feel heard by you?","🌪️ Can you combine with someone today?","🌿 How are you restoring yourself?"];
  document.getElementById("whcards").innerHTML=HABITS.map((h,i)=>{
    const id=!!hb[h.id];const nt2=nt[h.id]||"";const pv=nt2?`📝 "${nt2.length>38?nt2.slice(0,38)+"…":nt2}"`:"＋ Write reflection";
    return`<div class="hcc ${id?"done":""}" style="--hc:${h.color};animation-delay:${i*0.04}s">
      <div class="hccm" onclick="tgWH(${h.id})"><div class="hccbox">${id?"✓":""}</div>
      <div class="hcct"><div class="hccn">${h.emoji} Habit ${h.id}: ${h.name}</div><div class="hccs">${h.subtitle}</div></div></div>
      <div class="hccp" onclick="tgWN(${h.id})">${id?pv:wp2[i]}</div>
      <div class="hccnr" id="wnr-${h.id}">
        <textarea class="hccni" id="wn-${h.id}" placeholder="Quick reflection...">${(nt[h.id]||"").replace(/"/g,"&quot;")}</textarea>
        <button class="hccnsv" style="background:${h.color}" onclick="svWN(${h.id})">Save</button>
      </div>
    </div>`;
  }).join("");
}

function tgWH(id){const tod=tdk();if(!ST.wd[tod])ST.wd[tod]={habits:{},notes:{}};ST.wd[tod].habits[id]=!ST.wd[tod].habits[id];sv();rwck(document.getElementById("dailyContent"));}
function tgWN(id){const r=document.getElementById("wnr-"+id);const i=document.getElementById("wn-"+id);if(r&&r.classList.toggle("open")&&i)i.focus();}
function svWN(id){const tod=tdk();if(!ST.wd[tod])ST.wd[tod]={habits:{},notes:{}};const i=document.getElementById("wn-"+id);if(i)ST.wd[tod].notes[id]=i.value;sv();rwck(document.getElementById("dailyContent"));}

/* PROGRESS */
function gStr(id){
  let s=0;const d=new Date();
  while(true){const k=d.toISOString().split("T")[0];const a=(ST.td[k]&&ST.td[k].habits&&ST.td[k].habits[id])||(ST.wd[k]&&ST.wd[k].habits&&ST.wd[k].habits[id]);if(a){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}

function rpg(){
  const el=document.getElementById("progContent");
  if(!ST.ad){el.innerHTML=`<div class="ndmsg">Complete your assessment first to see progress data.</div>`;return;}
  const wd=wkd();const tod=tdk();
  const bars=wd.map(day=>{
    const td=ST.td[day];const wdd=ST.wd[day];const hb=(td&&td.habits)||(wdd&&wdd.habits)||{};
    const cnt=HABITS.filter(h=>hb[h.id]).length;const it=day===tod;
    const hp=Math.max(4,Math.round((cnt/7)*88));
    const bg=it?"linear-gradient(180deg,#fbbf24,#f59e0b)":cnt===7?"linear-gradient(180deg,#10b981,#059669)":"linear-gradient(180deg,#6366f1,#4f46e5)";
    const lb=new Date(day+"T12:00:00").toLocaleDateString("en",{weekday:"short"});
    return`<div class="bc"><div class="bcc">${cnt>0?cnt:""}</div><div class="b" style="height:${hp}px;background:${bg}"></div><div class="bl${it?" today":""}">${lb}</div></div>`;
  }).join("");
  const strs=HABITS.map(h=>{
    const str=gStr(h.id);const wc=wd.filter(d=>{const td=ST.td[d];const wdd=ST.wd[d];return(td&&td.habits&&td.habits[h.id])||(wdd&&wdd.habits&&wdd.habits[h.id]);}).length;
    const dots=wd.map(d=>{const td=ST.td[d];const wdd=ST.wd[d];const f=(td&&td.habits&&td.habits[h.id])||(wdd&&wdd.habits&&wdd.habits[h.id]);const t=d===tod;return`<div class="sdot" style="${f?`background:${h.color}`:""};${t?`border:2px solid ${h.color}`:""}"></div>`;}).join("");
    return`<div class="strow"><div style="font-size:18px">${h.emoji}</div><div style="flex:1"><div style="font-weight:800;font-size:12px">Habit ${h.id}: ${h.name}</div><div class="sdots">${dots}</div></div><div class="str">${str>0?`<div class="sfire">🔥 ${str}d</div>`:""}<div class="sdlbl">${wc}/7 days</div></div></div>`;
  }).join("");
  el.innerHTML=`<div class="bchwrap"><div class="bars">${bars}</div></div>
  ${ST.as?`<div style="margin-bottom:16px"><p style="font-size:13px;font-weight:800;margin-bottom:10px">Your Assessment Radar</p>${bRad(ST.as)}<p style="font-size:11px;color:rgba(255,255,255,0.45);text-align:center;margin-top:6px">Taken on ${ST.adate||"Day 1"}</p></div>`:""}
  <p style="font-weight:800;font-size:13px;margin-bottom:10px">This Week's Habit Streaks</p>${strs}`;
}

/* PARENT */
function handleSecTap(){
  stc++;clearTimeout(stT);stT=setTimeout(()=>{stc=0;},2000);
  if(stc>=5){stc=0;document.getElementById("ptabBtn").style.display="";showView("parent");}
}

function rpar(){
  const el=document.getElementById("parentContent");
  if(!puL){rpins(el);return;}
  rpdb(el);
}

function rpins(el){
  el.innerHTML=`<div class="pinsc"><span class="pi">🔒</span><h2>Parent Dashboard</h2>
  <p>Enter your PIN to access Musa's progress data</p>
  <input class="pininp" type="password" id="pinInp" placeholder="Enter PIN" onkeydown="if(event.key==='Enter')chkPin()"/>
  <p class="pinerr" id="pinErr">Incorrect PIN. Try again.</p>
  <button class="btn-primary" onclick="chkPin()">Unlock Dashboard</button></div>`;
}

function chkPin(){
  const v=document.getElementById("pinInp")?.value||"";
  if(v===PIN){puL=true;rpdb(document.getElementById("parentContent"));}
  else{const e=document.getElementById("pinErr");if(e)e.style.display="block";}
}

function rpdb(el){
  if(!ST.ad){el.innerHTML=`<div class="pdbody"><div class="pdhdr"><h2>Parent Dashboard 🔒</h2><button class="pdlkbtn" onclick="lkPar()">🔒 Lock</button></div><div class="ndmsg"><span style="font-size:40px;display:block;margin-bottom:12px">⏳</span><p>Musa hasn't completed his assessment yet.</p></div></div>`;return;}
  const sc=ST.as||{};const tk=Object.keys(ST.td||{}).sort();const totD=tk.length;const compD=tk.filter(k=>ST.td[k]&&ST.td[k].complete).length;
  const hs=HABITS.map(h=>{const as=sc[h.id]||0;const t=gTier(as);const th=tk.filter(k=>ST.td[k]&&ST.td[k].habits&&ST.td[k].habits[h.id]).length;return{h,as,t,th,totD};});
  const gaps=hs.filter(x=>x.as>=6&&totD>0&&x.th<(totD*0.5));
  const surp=hs.filter(x=>x.as<=4&&totD>0&&x.th>=(totD*0.67));
  const cw=ST.cw||1;const wp=ST.wp[cw]||{};

  el.innerHTML=`<div class="pdbody">
  <div class="pdhdr"><h2>Parent Dashboard 🔒</h2><button class="pdlkbtn" onclick="lkPar()">🔒 Lock</button></div>

  <div class="pdsec"><p class="pdst">📸 Snapshot</p>
  <div class="pdsg">
    <div class="pds"><div class="psv" style="color:#3b82f6">${compD}/3</div><div class="psl">Trial Days Done</div></div>
    <div class="pds"><div class="psv" style="color:#10b981">${hs.filter(x=>x.as>=7).length}</div><div class="psl">Strong Habits</div></div>
    <div class="pds"><div class="psv" style="color:#ef4444">${hs.filter(x=>x.as<=3).length}</div><div class="psl">Priority Focus</div></div>
  </div>
  <p style="font-size:11px;color:rgba(255,255,255,0.45)">Assessment: ${ST.adate||"—"} · Trial days: ${totD}</p></div>

  <div class="pdsec"><p class="pdst">📊 Assessment Scores + Radar</p>
  ${bRad(sc)}
  <div style="margin-top:10px">${hs.map(x=>`<div class="phr"><span style="font-size:18px">${x.h.emoji}</span><div style="flex:1"><div class="phrn">${x.h.name}</div><div class="phrs" style="color:${x.t.color}">Assessment: ${x.as}/9 · Practised in trial: ${x.th}/${totD} days</div></div><span class="phrt" style="background:${x.t.bg};color:${x.t.color};border:1px solid ${x.t.brd}">${x.t.lbl}</span></div>`).join("")}</div></div>

  ${gaps.length||surp.length?`<div class="pdsec"><p class="pdst">🔍 Behaviour Gaps & Surprises</p>
  ${gaps.map(x=>`<div class="gapcard"><h4>⚠️ Gap: ${x.h.emoji} ${x.h.name}</h4><p>Scored himself ${x.as}/9 (confident) but only practised ${x.th}/${totD} trial days. Worth a conversation.</p></div>`).join("")}
  ${surp.map(x=>`<div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:12px;margin-bottom:8px"><h4 style="font-size:12px;font-weight:800;color:#86efac;margin-bottom:4px">✨ Surprise: ${x.h.emoji} ${x.h.name}</h4><p style="font-size:12px;color:rgba(255,255,255,0.72);line-height:1.58">Scored himself low (${x.as}/9) but practised consistently. He may be underselling himself.</p></div>`).join("")}
  </div>`:""}

  ${totD>0?`<div class="pdsec"><p class="pdst">📝 Musa's Reflections</p>
  <div class="pddt">
    <button class="pddtb ${ST.pvd===0?"active":""}" onclick="setPVD(0)">All Days</button>
    ${tk.map((k,i)=>`<button class="pddtb ${ST.pvd===i+1?"active":""}" onclick="setPVD(${i+1})">Day ${i+1}</button>`).join("")}
  </div>
  ${tk.map((day,di)=>{
    if(ST.pvd!==0&&ST.pvd!==di+1)return"";
    const dd=ST.td[day]||{};const mr=dd.mr||"";
    return`<div style="margin-bottom:14px">
    <p style="font-size:12px;font-weight:800;color:rgba(251,191,36,0.8);margin-bottom:8px">— Day ${di+1} (${day}) —</p>
    ${mr?`<div class="prc"><div class="prch"><span style="font-size:16px">🎯</span><span style="font-size:12px;font-weight:800">Mission Response</span><span style="font-size:10px;color:rgba(255,255,255,0.45);margin-left:auto">Day ${di+1}</span></div><p class="prct">${mr}</p></div>`:`<p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:8px;font-style:italic">No mission response for Day ${di+1}.</p>`}
    ${HABITS.map(h=>{const nt=dd.notes&&dd.notes[h.id];const dn=dd.habits&&dd.habits[h.id];if(!nt&&!dn)return"";return`<div class="prc"><div class="prch"><span style="font-size:16px">${h.emoji}</span><span style="font-size:12px;font-weight:800">${h.name}</span><span style="font-size:10px;color:rgba(255,255,255,0.45);margin-left:auto">${dn?"✅":"⬜"}</span></div>${nt?`<p class="prct">${nt}</p>`:`<p class="prct" style="opacity:0.4">No reflection written.</p>`}</div>`;}).join("")}
    </div>`;
  }).join("")}</div>`:`<div class="pdsec"><p class="pdst">📝 Reflections</p><div class="ndmsg">No trial days completed yet.</div></div>`}

  <div class="pdsec"><p class="pdst">📋 Week ${cw} Program — Paste from Claude</p>
  <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:10px;line-height:1.6">
    📸 Screenshot this dashboard → share it in claude.ai → Claude writes Musa's program → paste it below → approve it.
  </p>
  <p style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.45);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Program content from Claude:</p>
  <textarea class="progta" id="progInp" placeholder="Paste Musa's Week ${cw} program here after getting it from Claude...">${wp.content||""}</textarea>
  <p style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.45);margin:10px 0 6px;text-transform:uppercase;letter-spacing:0.5px">Your personal note to Musa (optional):</p>
  <textarea class="noteta" id="noteInp" placeholder="Add a personal message for Musa...">${wp.pn||""}</textarea>
  <button class="appbtn" onclick="appProg()">✅ Approve & Send to Musa</button>
  ${wp.approved?`<p style="font-size:12px;color:#10b981;text-align:center;margin-top:8px;font-weight:700">✅ Approved on ${wp.ad||"—"} — visible to Musa</p>`:""}</div>

  <div class="pdsec"><p class="pdst">📅 Week Navigation</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    ${[1,2,3,4].map(w=>`<button onclick="setCW(${w})" style="padding:8px 16px;border-radius:99px;border:2px solid ${ST.cw===w?"#fbbf24":"rgba(255,255,255,0.15)"};background:${ST.cw===w?"rgba(251,191,36,0.15)":"transparent"};color:${ST.cw===w?"#fbbf24":"rgba(255,255,255,0.45)"};font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;cursor:pointer">Week ${w}${ST.wp[w]&&ST.wp[w].approved?" ✅":""}</button>`).join("")}
  </div></div>

  </div>`;
}

function setPVD(d){ST.pvd=d;sv();rpdb(document.getElementById("parentContent"));}
function appProg(){
  const c=document.getElementById("progInp")?.value||"";const n=document.getElementById("noteInp")?.value||"";
  if(!c.trim()){alert("Please paste the program content first.");return;}
  const w=ST.cw||1;if(!ST.wp[w])ST.wp[w]={};
  ST.wp[w].content=c;ST.wp[w].pn=n;ST.wp[w].approved=true;ST.wp[w].ad=tdk();sv();
  rpdb(document.getElementById("parentContent"));
}
function setCW(w){ST.cw=w;sv();rpdb(document.getElementById("parentContent"));}
function lkPar(){puL=false;rpins(document.getElementById("parentContent"));}

/* SECRET — hold header title 3s */
const ht=document.getElementById("headerTitle");
function shwPTab(){document.getElementById("ptabBtn").style.display="";showView("parent");}
ht.addEventListener("mousedown",()=>{hlpT=setTimeout(shwPTab,3000);});
ht.addEventListener("mouseup",()=>clearTimeout(hlpT));
ht.addEventListener("touchstart",()=>{hlpT=setTimeout(shwPTab,3000);},{passive:true});
ht.addEventListener("touchend",()=>clearTimeout(hlpT));

/* INIT */
ld();rhm();rlc();
if(ST.tc)document.getElementById("ptabBtn").style.display="";
</script>
</body>
</html>
